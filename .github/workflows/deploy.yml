name: Deploy to Digital Ocean

on:
  push:
    branches: [ "master" ] # Se ejecutará al hacer git push a la rama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            echo "0. Limpiando espacio en disco (Docker)..."
            docker system prune -f || true
            cd /root/app
            
            echo "1. Descargando codigo de Github..."
            echo "2. Reconstruyendo contenedores (Secuencial)..."
            # Construimos una imagen tras otra, sin paralelismo para no forzar la CPU/RAM
            docker compose build --parallel=false server
            docker compose build --parallel=false client
            
            echo "3. Reiniciando servicios y liberando RAM..."
            # Paramos todo para asegurar que tenemos el 100% de la RAM libre para Prisma
            docker compose down
            
            echo "4. Ejecutando Migración (Modo Aislado)..."
            # Usamos 'run' en lugar de 'exec' para mayor eficiencia y le damos un límite de memoria a Node
            docker compose run --rm -e NODE_OPTIONS="--max-old-space-size=450" server npx prisma db push
            
            echo "5. Encendiendo la aplicación Final..."
            docker compose up -d
            
            echo "DESPLIEGUE FINALIZADO"
