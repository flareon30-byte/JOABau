name: Deploy to Digital Ocean

on:
  push:
    branches: [ "master" ] # Se ejecutará al hacer git push a la rama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 161.35.68.77
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            echo "0. Limpiando espacio en disco (Docker)..."
            docker system prune -f || true
            cd /opt/JOABau
            
            echo "1. Descargando codigo de Github..."
            git fetch origin master
            git reset --hard origin/master
            
            echo "2. Reconstruyendo contenedores (Secuencial)..."
            docker-compose build --parallel=false server
            docker-compose build --parallel=false client
            
            echo "3. Deteniendo y limpiando contenedores previos..."
            docker-compose down --remove-orphans || true
            # Eliminamos forzosamente cualquier residuo para evitar errores de Conflict
            docker rm -f joabau-server-1 joabau-client-1 joabau-postgres-1 || true
            docker network prune -f || true
            
            echo "4. Encendiendo aplicación inmediatamente..."
            # Forzamos la recreación para asegurar que carguen los nuevos cambios
            docker-compose up -d --force-recreate
            
            echo "5. Actualizando Base de Datos (en segundo plano)..."
            # Intentamos la migración; si falla por RAM, la app sigue arriba
            docker-compose exec -T server npx prisma db push --accept-data-loss || echo "Aviso: La migración falló por memoria, pero la app está funcionando."
            
            echo "DESPLIEGUE FINALIZADO"
