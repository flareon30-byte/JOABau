name: Deploy to Digital Ocean

on:
  push:
    branches: [ "master" ] # Se ejecutará al hacer git push a la rama master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            echo "0. Limpiando espacio en disco (Docker)..."
            docker system prune -f || true
            cd /root/app
            
            echo "1. Descargando codigo de Github..."
            git fetch origin master
            git reset --hard origin/master
            
            echo "2. Reconstruyendo contenedores (Secuencial)..."
            docker compose build --parallel=false server
            docker compose build --parallel=false client
            
            echo "3. Encendiendo aplicación inmediatamente..."
            # Forzamos el arranque antes de la migración para asegurar disponibilidad
            docker compose up -d
            
            echo "4. Actualizando Base de Datos (en segundo plano)..."
            # Intentamos la migración; si falla por RAM, la app sigue arriba
            docker compose exec -T server npx prisma db push || echo "Aviso: La migración falló por memoria, pero la app está funcionando."
            
            echo "DESPLIEGUE FINALIZADO"
