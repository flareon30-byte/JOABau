services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
      POSTGRES_DB: ${DB_NAME:-fiberoptics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Exposing the db port is dangerous. If needed, bind to 127.0.0.1 (local only)
    # ports:
    #   - "127.0.0.1:5434:5432"

  server:
    build: ./server
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-securepassword}@postgres:5432/${DB_NAME:-fiberoptics}?schema=public
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/backups:/app/backups
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      args:
        VITE_GOOGLE_MAPS_KEY: AIzaSyDJiKbyOAUHXATnA_gurI9L7ViIJd73yOk
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
